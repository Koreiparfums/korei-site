    <meta property="og:site_name" content="Korei" />
    <meta property="og:title" content="Fiche produit — Korei" />
    <meta property="og:description" content="Fiche produit Korei — décants et flacons authentiques de parfumerie de niche." />
    <meta property="og:url" content="https://korei.fr/pages/product" />
    <meta property="og:image" content="https://korei.fr/assets/images/og/og-default.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fiche produit — Korei" />
    <meta name="twitter:description" content="Fiche produit Korei — décants et flacons authentiques de parfumerie de niche." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body data-page="product">
    <div class="banner">
      <span>Décants 100% authentiques</span>
    </div>

    <header class="header">
      <div class="header-left">
        <button class="hamburger" onclick="toggleMenu()" aria-label="Menu" type="button">
          <i class="ti ti-menu-2"></i>
        </button>
        <nav class="nav">
          <a href="../index.html">Accueil</a>
          <a href="catalogue.html" class="active">Parfums</a>
          <a href="coffret.html">Coffret</a>
          <a href="brands.html">Marques</a>
          <a href="collections.html">Collections</a>
        </nav>
      </div>
      <a href="../index.html" class="logo logo-center">Kōrei</a>
      <div class="header-right">
        <div class="header-actions">
          <button class="icon-btn" aria-label="Panier" type="button"><i class="ti ti-shopping-bag"></i></button>
        </div>
      </div>
    </header>

    <div class="mobile-menu" id="mobileMenu">
      <div class="mobile-overlay" onclick="toggleMenu()"></div>
      <div class="mobile-drawer">
        <a href="../index.html">Accueil</a>
        <a href="catalogue.html">Parfums</a>
        <a href="coffret.html">Coffret</a>
        <a href="brands.html">Marques</a>
        <a href="collections.html">Collections</a>
      </div>
    </div>

    <main class="product-page" id="product-main"></main>

    <section class="section" style="padding-top: 0">
      <div class="section-head">
        <h2 class="section-title">De la même <em>maison</em></h2>
        <a href="catalogue.html" class="section-link">Catalogue</a>
      </div>
      <div class="products-grid" id="related-products"></div>
    </section>

    <footer>
      <div class="footer-bottom" style="padding: 36px var(--px); border-top: 1px solid rgba(255,255,255,0.1)">
        <div class="footer-copy">© 2026 Korei</div>
      </div>
    </footer>

    <div id="chatbot-widget" class="chatbot-widget">
      <div id="chatbot-panel" class="chatbot-panel" role="dialog" aria-label="Conseiller olfactif Korei">
        <div class="chatbot-head">
          <div>
            <div class="chatbot-head-title">Conseiller Korei</div>
            <div class="chatbot-head-sub">Assistant olfactif · Démo</div>
          </div>
          <button type="button" id="chatbot-close" class="chatbot-close" aria-label="Fermer"><i class="ti ti-x"></i></button>
        </div>
        <div id="chatbot-messages" class="chatbot-messages"></div>
        <div id="chatbot-suggestions" class="chatbot-suggestions"></div>
        <div class="chatbot-foot">
          <form id="chatbot-form" class="chatbot-form">
            <input type="text" id="chatbot-input" class="chatbot-input" placeholder="Décrivez ce que vous cherchez…" autocomplete="off" />
            <button type="submit" class="chatbot-send" aria-label="Envoyer"><i class="ti ti-send"></i></button>
          </form>
        </div>
        <div class="chatbot-mock-badge">Mode démo — IA à connecter</div>
      </div>
      <button type="button" id="chatbot-toggle" class="chatbot-toggle" aria-label="Ouvrir le conseiller olfactif" aria-expanded="false">
        <i class="ti ti-message-chatbot"></i>
      </button>
    </div>

    <script src="../assets/js/site.js"></script>
    <script src="../assets/js/products.js"></script>
    <script src="../assets/js/product-store.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/chatbot.js"></script>
  </body>
</html>
